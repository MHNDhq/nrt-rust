# Stress manifest: 1 router + 50 resident specialists, targeting the spec's
# "50+ Resident model footprints on RTX 4090" density claim. Used by the
# nrt-bench crate to measure orchestrator overhead and LRU eviction shape.

cluster: density-50-stress

resources:
  gpu_budget: 24GB
  ram_budget: 64GB

